<!DOCTYPE html>
<html>
<head>
    <title>BizBridge - Connect Local Businesses</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 45px;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 25px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px #ccc;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<header>
    <h1>BizBridge</h1>
    <p>Helping local businesses connect with customers digitally</p>
</header>

<div class="container">

<div class="card">
    <h2>Discover Local Businesses</h2>
    <p>Find shops, services and entrepreneurs around you in one place.</p>
    <button>Explore Businesses</button>
</div>

<div class="card">
    <h2>Grow Your Business</h2>
    <p>Small businesses can showcase their products and reach more customers.</p>
    <button>Join BizBridge</button>
</div>

</div>

</body>
</html>
